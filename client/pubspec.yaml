name: touchplay
description: Turn your phone into a gamepad for any game

publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  wakelock_plus: ^1.1.1
  vibration: ^3.1.0
  shared_preferences: ^2.2.0
  sensors_plus: ^7.0.0
  device_info_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
