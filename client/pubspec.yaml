name: touchplay
description: Turn your phone into a gamepad for any game

publish_to: 'none'

version: 1.4.0+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  wakelock_plus: ^1.1.1
  vibration: ^3.1.0
  shared_preferences: ^2.2.0
  sensors_plus: ^7.0.0
  device_info_plus: ^10.1.2
  url_launcher: ^6.3.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  # Legacy (Android < 8) fallback — the full controller-on-blue square.
  image_path: "assets/app_icon.png"
  # Adaptive icon (Android 8+): solid brand-blue background layer + the
  # controller as a transparent foreground, so launchers mask it into a clean
  # circle/squircle that fills the shape (no more square-in-circle look).
  adaptive_icon_background: "#03A4FE"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  adaptive_icon_monochrome: "assets/app_icon_monochrome.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sfx/
    - assets/ps5screen.png
    - assets/covers/

flutter_native_splash:
  color: "#0081ff"
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    icon_background_color: "#0081ff"
