name: touchplay
description: Turn your phone into a gamepad for any game

publish_to: 'none'

version: 1.5.0+21

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  wakelock_plus: ^1.1.1
  vibration: ^3.1.0
  shared_preferences: ^2.2.0
  sensors_plus: ^7.0.0
  device_info_plus: ^10.1.2
  url_launcher: ^6.3.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  # Legacy (Android < 8) fallback.
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#080810"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sfx/
    - assets/ps5screen.png
    - assets/covers/

  # Sora (OFL) — the app's designed typeface, same as the intro/home mocks.
  # Bundled statically so every weight the design uses (200–700) renders true
  # instead of being faked from Roboto.
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Sora-Light.ttf
          weight: 300
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#080810"
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    icon_background_color: "#080810"
